name: Quality

on:
  workflow_dispatch:
  pull_request:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build mobile client
        run: npm run build --workspace apps/mobile-web

      - name: Restore Windows host tests
        run: dotnet restore tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj

      - name: Build Windows host tests
        run: dotnet build tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj --no-restore

      - name: Test mobile client
        run: npm run test:web

      - name: Test Windows host
        run: dotnet test tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj --no-build --no-restore
