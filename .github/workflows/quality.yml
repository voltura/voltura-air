name: Quality

on:
  workflow_dispatch:
  pull_request:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Check for preinstalled .NET 10 SDK
        id: dotnet
        shell: pwsh
        run: |
          $available = $false
          if ($null -ne (Get-Command dotnet -ErrorAction SilentlyContinue)) {
            $available = [bool](dotnet --list-sdks | Where-Object { $_ -match '^10\.0\.' } | Select-Object -First 1)
          }

          "available=$($available.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($available) {
            dotnet --version
          }

      - name: Setup .NET 10 fallback
        if: steps.dotnet.outputs.available != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Check documentation map
        run: npm run docs:check

      - name: Check generated UI tokens
        run: npm run ui:tokens:check

      - name: Check source ownership reviews
        run: npm run size:check

      - name: Build mobile client
        run: npm run build --workspace apps/mobile-web

      - name: Restore Windows host tests
        run: dotnet restore tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj

      - name: Build Windows host tests
        run: dotnet build tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj --no-restore

      - name: Test mobile client
        run: npm run test:web

      - name: Test automation scripts
        run: npm run test:scripts

      - name: Test Windows host
        run: dotnet test tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj --no-build --no-restore
