name: Publish Voltura Air release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

jobs:
  resolve-release:
    name: Resolve release information
    runs-on: windows-latest
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      runtime: ${{ steps.release.outputs.runtime }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve and validate release information
        id: release
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          PREVIOUS_SHA: ${{ github.event.before }}
        run: |
          $semVerPattern = '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'
          $version = [string]((Get-Content package.json -Raw | ConvertFrom-Json).version)
          if ($version -notmatch $semVerPattern) {
            throw "package.json version '$version' is not a supported semantic version."
          }

          $tag = "v$version"
          git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Derived release tag '$tag' is invalid."
          }

          $shouldPublish = $true
          if ($env:EVENT_NAME -eq 'push') {
            $previousPackageJson = git show "$env:PREVIOUS_SHA`:package.json" 2>$null
            if ($LASTEXITCODE -eq 0) {
              $previousVersion = [string]($previousPackageJson | ConvertFrom-Json).version
              if ($previousVersion -eq $version) {
                $shouldPublish = $false
                Write-Host "package.json version remains $version; no release will be published."
              }
            }
          }

          "should_publish=$($shouldPublish.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "runtime=win-x64" >> $env:GITHUB_OUTPUT

  build-and-publish-release:
    name: Build and publish release
    needs: resolve-release
    if: needs.resolve-release.outputs.should_publish == 'true'
    concurrency:
      group: release-${{ needs.resolve-release.outputs.tag }}
      cancel-in-progress: false
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
      RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
      RUNTIME: ${{ needs.resolve-release.outputs.runtime }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Check for preinstalled .NET 10 SDK
        id: dotnet
        shell: pwsh
        run: |
          $available = $false
          if ($null -ne (Get-Command dotnet -ErrorAction SilentlyContinue)) {
            $available = [bool](dotnet --list-sdks | Where-Object { $_ -match '^10\.0\.' } | Select-Object -First 1)
          }

          "available=$($available.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($available) {
            dotnet --version
          }

      - name: Setup .NET 10 fallback
        if: steps.dotnet.outputs.available != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install npm dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate release information
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($env:RELEASE_VERSION -ne $packageVersion) {
            throw "Resolved release version '$env:RELEASE_VERSION' does not match package.json version '$packageVersion'."
          }

          if ($env:RELEASE_TAG -ne "v$packageVersion") {
            throw "Resolved release tag '$env:RELEASE_TAG' must be 'v$packageVersion'."
          }

      - name: Test
        run: npm test

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --version=3.12.0 -y --no-progress

      - name: Package release assets
        shell: pwsh
        run: npm run package:win -- -Version $env:RELEASE_VERSION -Runtime $env:RUNTIME

      - name: Collect asset paths
        id: package
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION
          $runtime = $env:RUNTIME
          $zipName = "VolturaAir-$version-$runtime.zip"
          $installerName = "VolturaAir-Setup-$version-$runtime-full.exe"
          $frameworkDependentInstallerName = "VolturaAir-Setup-$version-$runtime.exe"
          $zipPath = "artifacts/publish/$zipName"
          $installerPath = "artifacts/publish/$installerName"
          $frameworkDependentInstallerPath = "artifacts/publish/$frameworkDependentInstallerName"

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_name=$frameworkDependentInstallerName" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_path=$frameworkDependentInstallerPath" >> $env:GITHUB_OUTPUT

      - name: Reject an existing release tag
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Invalid release tag '$tag'."
            exit $LASTEXITCODE
          }

          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify whether release tag '$tag' already exists."
          }

          if ($remoteTag) {
            throw "Release tag '$tag' already exists. Prepare and publish a new semantic version instead of moving an existing tag."
          }

      - name: Create release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $installerPath = "${{ steps.package.outputs.installer_path }}"
          $frameworkDependentInstallerPath = "${{ steps.package.outputs.framework_dependent_installer_path }}"

          $releaseArguments = @(
            "release", "create", $tag,
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", "Voltura Air $tag",
            "--draft",
            "--generate-notes",
            "--fail-on-no-commits",
            "--notes", "Voltura Air is free software from Voltura AB. If it helps you, optional support links are available through Ko-fi and PayPal."
          )

          if ($env:RELEASE_VERSION.Contains("-")) {
            $releaseArguments += "--prerelease"
          }

          $releaseArguments += @($zipPath, $installerPath, $frameworkDependentInstallerPath)
          & gh @releaseArguments

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
