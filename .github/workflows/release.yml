name: Release Voltura Air

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create or update
        required: true
        default: v0.5.0
      version:
        description: Version used in release asset names
        required: true
        default: 0.5.0
      runtime:
        description: .NET runtime identifier
        required: true
        default: win-x64

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-upsert-release-assets:
    name: Build and upsert release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install npm dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate release inputs
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version

          if ($env:RELEASE_VERSION -ne $packageVersion) {
            throw "Workflow version '$env:RELEASE_VERSION' does not match package.json version '$packageVersion'. Run npm run release -- <version> and commit the prepared files first."
          }

          if ($env:RELEASE_TAG -ne "v$packageVersion") {
            throw "Workflow release tag '$env:RELEASE_TAG' must be 'v$packageVersion'."
          }

          if ($env:RUNTIME -ne "win-x64") {
            throw "The release workflow currently supports only the verified win-x64 runtime."
          }

      - name: Build release outputs
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: npm run package:win -- -Version $env:RELEASE_VERSION -Runtime $env:RUNTIME -BuildOnly

      - name: Test mobile client
        run: npm run test:web

      - name: Test Windows host
        run: dotnet test tests/VolturaAir.Host.Tests/VolturaAir.Host.Tests.csproj -c Release -r ${{ inputs.runtime }} --no-build --no-restore

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --version=3.12.0 -y --no-progress

      - name: Package release assets
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: npm run package:win -- -Version $env:RELEASE_VERSION -Runtime $env:RUNTIME -SkipBuild

      - name: Collect asset paths
        id: package
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: |
          $version = $env:RELEASE_VERSION
          $runtime = $env:RUNTIME
          $zipName = "VolturaAir-$version-$runtime.zip"
          $installerName = "VolturaAir-Setup-$version-$runtime-full.exe"
          $frameworkDependentInstallerName = "VolturaAir-Setup-$version-$runtime.exe"
          $zipPath = "artifacts/publish/$zipName"
          $installerPath = "artifacts/publish/$installerName"
          $frameworkDependentInstallerPath = "artifacts/publish/$frameworkDependentInstallerName"

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_name=$frameworkDependentInstallerName" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_path=$frameworkDependentInstallerPath" >> $env:GITHUB_OUTPUT

      - name: Refresh release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG
          git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Invalid release tag '$tag'."
            exit $LASTEXITCODE
          }

          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          if ($remoteTag) {
            $remoteTagObject = ($remoteTag -split "\s+")[0]
            git tag --force $tag $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            git push "--force-with-lease=refs/tags/$tag`:$remoteTagObject" origin "refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          else {
            git tag $tag $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            git push origin "refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Create release if missing and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $installerPath = "${{ steps.package.outputs.installer_path }}"
          $frameworkDependentInstallerPath = "${{ steps.package.outputs.framework_dependent_installer_path }}"
          $viewOutput = gh release view $tag --repo $env:GITHUB_REPOSITORY 2>&1
          if ($LASTEXITCODE -ne 0) {
            $message = ($viewOutput | Out-String)
            if ($message -notmatch "release not found|Not Found|404") {
              Write-Error $message
              exit 1
            }

            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title "Voltura Air $tag" `
              --notes "Windows release assets for Voltura Air $tag."

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          gh release upload $tag $zipPath $installerPath $frameworkDependentInstallerPath --clobber --repo $env:GITHUB_REPOSITORY

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
