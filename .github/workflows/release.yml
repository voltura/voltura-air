name: Release Voltura Air

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create or update
        required: true
        default: v0.5.0
      version:
        description: Version used in release asset names
        required: true
        default: 0.5.0
      runtime:
        description: .NET runtime identifier
        required: true
        default: win-x64

permissions:
  contents: write

jobs:
  build-and-upsert-release-assets:
    name: Build and upsert release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --version=3.12.0 -y --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Validate release inputs
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $inputVersion = "${{ inputs.version }}"
          $inputTag = "${{ inputs.release_tag }}"

          if ($inputVersion -ne $packageVersion) {
            throw "Workflow version '$inputVersion' does not match package.json version '$packageVersion'. Run npm run release -- <version> and commit the prepared files first."
          }

          if ($inputTag -ne "v$packageVersion") {
            throw "Workflow release tag '$inputTag' must be 'v$packageVersion'."
          }

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package release assets
        shell: pwsh
        run: npm run package:win -- -Version "${{ inputs.version }}" -Runtime "${{ inputs.runtime }}"

      - name: Validate Windows file metadata
        shell: pwsh
        run: |
          & .\scripts\verify-windows-version.ps1 `
            -Version "${{ inputs.version }}" `
            -Runtime "${{ inputs.runtime }}" `
            -RequireHostDll

          & .\scripts\verify-windows-version.ps1 `
            -Version "${{ inputs.version }}" `
            -Runtime "${{ inputs.runtime }}" `
            -PublishDir "artifacts/publish/VolturaAir-${{ inputs.runtime }}-framework-dependent" `
            -InstallerPath "artifacts/publish/VolturaAir-Setup-${{ inputs.version }}-${{ inputs.runtime }}.exe" `
            -RequireHostDll

      - name: Collect asset paths
        id: package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $runtime = "${{ inputs.runtime }}"
          $zipName = "VolturaAir-$version-$runtime.zip"
          $installerName = "VolturaAir-Setup-$version-$runtime-full.exe"
          $frameworkDependentInstallerName = "VolturaAir-Setup-$version-$runtime.exe"
          $zipPath = "artifacts/publish/$zipName"
          $installerPath = "artifacts/publish/$installerName"
          $frameworkDependentInstallerPath = "artifacts/publish/$frameworkDependentInstallerName"

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_name=$frameworkDependentInstallerName" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_path=$frameworkDependentInstallerPath" >> $env:GITHUB_OUTPUT

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.installer_name }}
          path: ${{ steps.package.outputs.installer_path }}
          if-no-files-found: error

      - name: Upload framework-dependent installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.framework_dependent_installer_name }}
          path: ${{ steps.package.outputs.framework_dependent_installer_path }}
          if-no-files-found: error

      - name: Refresh release tag
        shell: pwsh
        run: |
          $tag = "${{ inputs.release_tag }}"
          git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Invalid release tag '$tag'."
            exit $LASTEXITCODE
          }

          git tag --force $tag $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          git push --force origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Create release if missing and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $installerPath = "${{ steps.package.outputs.installer_path }}"
          $frameworkDependentInstallerPath = "${{ steps.package.outputs.framework_dependent_installer_path }}"
          $viewOutput = gh release view $tag --repo $env:GITHUB_REPOSITORY 2>&1
          if ($LASTEXITCODE -ne 0) {
            $message = ($viewOutput | Out-String)
            if ($message -notmatch "release not found|Not Found|404") {
              Write-Error $message
              exit 1
            }

            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title "Voltura Air $tag" `
              --notes "Windows release assets for Voltura Air $tag."

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          gh release upload $tag $zipPath $installerPath $frameworkDependentInstallerPath --clobber --repo $env:GITHUB_REPOSITORY

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
