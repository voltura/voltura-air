name: Publish Voltura Air release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: New GitHub release tag to create
        required: true
        default: v0.6.2
      version:
        description: Version used in release asset names
        required: true
        default: 0.6.2
      runtime:
        description: .NET runtime identifier
        required: true
        default: win-x64

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-publish-release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Check for preinstalled .NET 10 SDK
        id: dotnet
        shell: pwsh
        run: |
          $available = $false
          if ($null -ne (Get-Command dotnet -ErrorAction SilentlyContinue)) {
            $available = [bool](dotnet --list-sdks | Where-Object { $_ -match '^10\.0\.' } | Select-Object -First 1)
          }

          "available=$($available.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($available) {
            dotnet --version
          }

      - name: Setup .NET 10 fallback
        if: steps.dotnet.outputs.available != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install npm dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate release inputs
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version

          if ($env:RELEASE_VERSION -ne $packageVersion) {
            throw "Workflow version '$env:RELEASE_VERSION' does not match package.json version '$packageVersion'. Run npm run release -- <version> and commit the prepared files first."
          }

          if ($env:RELEASE_TAG -ne "v$packageVersion") {
            throw "Workflow release tag '$env:RELEASE_TAG' must be 'v$packageVersion'."
          }

          if ($env:RUNTIME -ne "win-x64") {
            throw "The release workflow currently supports only the verified win-x64 runtime."
          }

      - name: Test
        run: npm test

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --version=3.12.0 -y --no-progress

      - name: Package release assets
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: npm run package:win -- -Version $env:RELEASE_VERSION -Runtime $env:RUNTIME

      - name: Collect asset paths
        id: package
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RUNTIME: ${{ inputs.runtime }}
        run: |
          $version = $env:RELEASE_VERSION
          $runtime = $env:RUNTIME
          $zipName = "VolturaAir-$version-$runtime.zip"
          $installerName = "VolturaAir-Setup-$version-$runtime-full.exe"
          $frameworkDependentInstallerName = "VolturaAir-Setup-$version-$runtime.exe"
          $zipPath = "artifacts/publish/$zipName"
          $installerPath = "artifacts/publish/$installerName"
          $frameworkDependentInstallerPath = "artifacts/publish/$frameworkDependentInstallerName"

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
          "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_name=$frameworkDependentInstallerName" >> $env:GITHUB_OUTPUT
          "framework_dependent_installer_path=$frameworkDependentInstallerPath" >> $env:GITHUB_OUTPUT

      - name: Reject an existing release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG
          git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Invalid release tag '$tag'."
            exit $LASTEXITCODE
          }

          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify whether release tag '$tag' already exists."
          }

          if ($remoteTag) {
            throw "Release tag '$tag' already exists. Prepare and publish a new semantic version instead of moving an existing tag."
          }

      - name: Create release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $installerPath = "${{ steps.package.outputs.installer_path }}"
          $frameworkDependentInstallerPath = "${{ steps.package.outputs.framework_dependent_installer_path }}"

          $releaseArguments = @(
            "release", "create", $tag,
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", "Voltura Air $tag",
            "--notes", "Windows release assets for Voltura Air $tag."
          )

          if ($tag.Contains("-")) {
            $releaseArguments += "--prerelease"
          }

          $releaseArguments += @($zipPath, $installerPath, $frameworkDependentInstallerPath)
          & gh @releaseArguments

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
